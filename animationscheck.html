<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Silver Material Template</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #e0e0e0; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Scene setup (Light gray background is essential for reflections)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdddddd); 

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 2. The "Light Tent" (Silver needs strong lights to reflect)
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 2.0)); // Sky/Ground light

        const keyLight = new THREE.DirectionalLight(0xffffff, 3.0);
        keyLight.position.set(5, 5, 5);
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 2.0);
        fillLight.position.set(-5, -5, 5);
        scene.add(fillLight);

        // 3. APPLYING THE MATERIAL
        const silverMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 1.0,
            roughness: 0.05,
            clearcoat: 1.0,
            clearcoatRoughness: 0.05,
            reflectivity: 1.0
        });

        // Create a shape and apply the material
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const sphere = new THREE.Mesh(geometry, silverMaterial);
        scene.add(sphere);

        // 4. Render loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Handle resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
